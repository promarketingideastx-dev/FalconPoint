<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0fb863",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                        "emerald-vivid": "#10B981",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .map-polygon {
            background: rgba(16, 185, 129, 0.3);
            border: 2px solid white;
            box-shadow: 0 0 0 2px #10B981;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 bg-white/90 backdrop-blur-md border-b border-emerald-900/10 z-20">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg text-white">
<span class="material-symbols-outlined">layers</span>
</div>
<h2 class="text-xl font-bold tracking-tight text-slate-900">SkyMetric <span class="text-primary">Workspace</span></h2>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center bg-emerald-50 rounded-full px-3 py-1 border border-emerald-100">
<span class="material-symbols-outlined text-emerald-600 text-sm mr-2">language</span>
<select class="bg-transparent border-none text-xs font-bold text-emerald-700 focus:ring-0 cursor-pointer p-0 pr-6 uppercase">
<option>EN</option>
<option>ES</option>
<option>PT</option>
</select>
</div>
<button class="material-symbols-outlined text-slate-500 hover:text-primary transition-colors">account_circle</button>
</div>
</header>
<!-- Main Map Area -->
<main class="relative flex-1 bg-slate-200 overflow-hidden">
<!-- Satellite Map Placeholder -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="Satellite view of a suburban residential area" data-location="San Francisco, California" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDD2N8AJOzO2hz1DmzCxOdcMbw3z7HMmKETtTU3rVRsc1I-0NmIkt3Qp_0NXGrxmIU8ML6tGudrrnaDCFKncAPaidbhbqqHC-bB79saFGl3lOWxkXfw-loT3IMwdUNZ20z6o76fkKgmpd5penmFGMgNLDdQMZ1Bdv1uNmV_HRPovKQc-YZXPfQuest924dQzaK5to4hR9tUe9xfSugnb35HuSi8J8XXLqQ3LJkCzxeSxUZf6UlPYmtKZd0qOxPZLOb1PSR45YbPfwY')">
<!-- Emerald Measurement Polygon Overlay -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-48 map-polygon rounded-lg flex items-center justify-center">
<div class="bg-white/90 px-2 py-1 rounded text-[10px] font-bold text-emerald-700 shadow-sm">
                    4,250 sq ft
                </div>
</div>
</div>
<!-- Floating Controls -->
<div class="absolute top-6 left-6 flex flex-col gap-2 z-10">
<div class="glass-panel p-1 rounded-xl shadow-lg flex flex-col">
<button class="p-3 hover:bg-emerald-50 text-slate-700 hover:text-primary transition-colors rounded-lg">
<span class="material-symbols-outlined">add</span>
</button>
<div class="h-px bg-slate-200 mx-2"></div>
<button class="p-3 hover:bg-emerald-50 text-slate-700 hover:text-primary transition-colors rounded-lg">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<button class="glass-panel p-3 rounded-xl shadow-lg text-slate-700 hover:text-primary transition-colors">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<div class="absolute top-6 right-6 z-10">
<div class="glass-panel p-2 rounded-xl shadow-lg flex gap-2">
<button class="flex items-center gap-2 px-3 py-2 bg-primary text-white rounded-lg text-sm font-semibold">
<span class="material-symbols-outlined text-base">square_foot</span>
<span>Measure / Medir</span>
</button>
<button class="flex items-center gap-2 px-3 py-2 hover:bg-emerald-50 text-slate-700 rounded-lg text-sm font-semibold transition-colors">
<span class="material-symbols-outlined text-base">layers</span>
<span>Layers</span>
</button>
</div>
</div>
<!-- Bottom Sheet / Quote Card -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 z-20">
<div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-emerald-100">
<div class="p-1 flex justify-center bg-slate-50">
<div class="w-12 h-1 bg-slate-300 rounded-full my-1"></div>
</div>
<div class="p-6">
<div class="flex justify-between items-start mb-6">
<div>
<h3 class="text-xl font-bold text-slate-900 mb-1">Quick Quote / Cotización</h3>
<p class="text-sm text-slate-500">Project: Roof Analysis #7742</p>
</div>
<div class="text-right">
<span class="text-2xl font-black text-primary">$349.00</span>
<p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Estimated / Estimado</p>
</div>
</div>
<div class="grid grid-cols-3 gap-4 mb-6">
<div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100/50">
<p class="text-[10px] text-emerald-600 font-bold uppercase mb-1">Area</p>
<p class="text-lg font-bold text-slate-900">4,250 <span class="text-xs font-normal">sqft</span></p>
</div>
<div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100/50">
<p class="text-[10px] text-emerald-600 font-bold uppercase mb-1">Pitch / Pendiente</p>
<p class="text-lg font-bold text-slate-900">6/12</p>
</div>
<div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100/50">
<p class="text-[10px] text-emerald-600 font-bold uppercase mb-1">Confidence</p>
<p class="text-lg font-bold text-slate-900">98%</p>
</div>
</div>
<div class="flex gap-3">
<button class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">picture_as_pdf</span>
<span>Generate PDF / Generar PDF / Gerar PDF</span>
</button>
<button class="p-4 border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-600 transition-colors">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-white border-t border-emerald-900/5 px-6 py-2 pb-6 flex justify-around items-center z-30">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined filled">map</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Map</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600 transition-colors" href="#">
<span class="material-symbols-outlined">folder</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Projects</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600 transition-colors" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Reports</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600 transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Settings</span>
</a>
</nav>
</body></html>
